name: Release Build

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [ "main" ]
    tags:
      - "v*.*.*"

env:
  # Path to the solution file relative to the root of the project.
  SOLUTION_FILE_PATH: '.'
  TEMP_PATH: '.temp'
  DIST_PATH: '.dist'
  ARTIFACT_NAME: 'Borderless-Window-Utility'
  ARTIFACT_PATH: '.dist/*.exe'

permissions:
  contents: write

jobs:
  release-build:
    if: github.ref_type == 'tag'

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv and Python 3.12
        uses: astral-sh/setup-uv@v6
        with:
          python-version: 3.12

      - name: Build release version (uv)
        run: |
          uv sync
          uv run pyinstaller --onefile --collect-data textual --collect-all rich --name "${{ env.ARTIFACT_NAME }}" --distpath "${{ env.DIST_PATH }}" --workpath "${{ env.TEMP_PATH }}" --specpath "${{ env.TEMP_PATH }}" main.py
          uv run pyinstaller --onefile --noconsole --name "${{ env.ARTIFACT_NAME }}-Headless" --distpath "${{ env.DIST_PATH }}" --workpath "${{ env.TEMP_PATH }}" --specpath "${{ env.TEMP_PATH }}" main_headless.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Borderless-Window-Utility
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT_PATH }}
          fail_on_unmatched_files: true
